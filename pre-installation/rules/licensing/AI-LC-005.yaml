rule_id: AI-LC-005
name: Gemma Terms — synthetic data license propagates
description: >
  Model is under Google Gemma Terms of Use. Includes remote restriction
  clause and license propagation to derivatives trained on synthetic data
  generated by the model. Derivatives may inherit restrictions.
severity: MEDIUM
action: WARN
category: licensing
subcategory: open-weight
frameworks:
  nist_ai_rmf: [GOVERN 1.1]
  eu_ai_act: [Art. 53]
remediation: >
  Review Gemma Terms for deployment and derivative use. Document that
  synthetic data from model triggers license propagation. Ensure
  compliance with Google's acceptable use and attribution requirements.
applicable_platforms: [huggingface, ollama, lm-studio]
check_type: automated
requires_human_review: false
tags: [gemma, google, open-weight, license]
