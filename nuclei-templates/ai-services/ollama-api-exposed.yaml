id: ollama-api-exposed

info:
  name: Ollama LLM API Exposed Without Auth
  author: sl4y3r
  severity: medium
  description: |
    Ollama local LLM server API is accessible without authentication.
    An attacker can list all locally available models, run inference
    requests, and enumerate system capabilities.
  reference:
    - https://github.com/ollama/ollama/blob/main/docs/api.md
  tags: ai,ollama,llm,unauth,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/tags"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - '"models"'
        part: body
