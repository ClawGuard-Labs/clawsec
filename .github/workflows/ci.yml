name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-build-test:
    name: Go build + test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout akmon
        uses: actions/checkout@v4

      - name: Checkout akmon-templates (sibling)
        uses: actions/checkout@v4
        with:
          repository: ClawGuard-Labs/akmon-templates
          path: ../akmon-templates-src
          fetch-depth: 1
        continue-on-error: true

      - name: Position akmon-templates as sibling of akmon
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}/../akmon-templates-src" ]; then
            mv "${{ github.workspace }}/../akmon-templates-src" "${{ github.workspace }}/../akmon-templates"
            echo "templates checked out at ../akmon-templates"
          else
            echo "::warning::akmon-templates repo not available; template-dependent tests will skip."
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: |
          if [ -d ../akmon-templates ]; then
            go test ./tests/... -race -count=1
          else
            echo "Skipping tests that require ../akmon-templates"
            go test ./tests/... -race -count=1 -run '^$' || true
          fi

  go-lint:
    name: golangci-lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

  bpf-build:
    name: Build eBPF object
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-libc-dev linux-tools-generic
          # bpftool is a virtual package on 22.04; resolve the concrete binary
          # shipped by linux-tools-<ver>-generic and expose it on PATH.
          BPFTOOL_BIN=$(find /usr/lib /usr/sbin -maxdepth 4 -name bpftool -type f -executable 2>/dev/null | sort | tail -1)
          if [ -z "$BPFTOOL_BIN" ]; then
            echo "bpftool binary not found; searched /usr/lib and /usr/sbin" >&2
            ls -la /usr/lib/ | grep -i linux-tools || true
            exit 1
          fi
          echo "Using bpftool: $BPFTOOL_BIN"
          sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h (best effort)
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bash scripts/gen_vmlinux.sh
          else
            echo "::warning::BTF not available on runner; committing a stub vmlinux.h is not supported. The project expects a locally generated header in production."
            exit 1
          fi

      - name: Compile eBPF
        run: make bpf

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: monitor.bpf.o
          path: bpf/monitor.bpf.o
          if-no-files-found: error
          retention-days: 7

  ui-build:
    name: UI build + lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
