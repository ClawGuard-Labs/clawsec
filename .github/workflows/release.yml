name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and publish release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-libc-dev linux-tools-generic
          BPFTOOL_BIN=$(find /usr/lib /usr/sbin -maxdepth 4 -name bpftool -type f -executable 2>/dev/null | sort | tail -1)
          if [ -z "$BPFTOOL_BIN" ]; then
            echo "bpftool binary not found; searched /usr/lib and /usr/sbin" >&2
            exit 1
          fi
          echo "Using bpftool: $BPFTOOL_BIN"
          sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h
        run: bash scripts/gen_vmlinux.sh

      - name: Compile eBPF
        run: make bpf

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
